<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mohammad Zia khatri | Full Stack developer</title>
    <style>
      #root {
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s ease;
      }

      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #213448;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }

      .loader {
        display: flex;
        align-items: flex-end;
        gap: 10px;
        height: 44px;
      }

      .bar {
        --bar-height: 22px;
        --delay: 0s;
        width: 8px;
        height: var(--bar-height);
        border-radius: 999px;
        background: #86a8b7;
        transform-origin: bottom center;
        animation: barWave 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        animation-delay: var(--delay);
        will-change: transform, background-color;
      }

      .bar:nth-child(1) {
        --delay: 0s;
      }

      .bar:nth-child(2) {
        --delay: 0.1s;
      }

      .bar:nth-child(3) {
        --bar-height: 26px;
        --delay: 0.2s;
      }

      .bar:nth-child(4) {
        --bar-height: 30px;
        --delay: 0.3s;
      }

      .bar:nth-child(5) {
        --bar-height: 26px;
        --delay: 0.4s;
      }

      .bar:nth-child(6) {
        --delay: 0.5s;
      }

      .bar:nth-child(7) {
        --delay: 0.6s;
      }

      @keyframes barWave {
        0%,
        100% {
          transform: scaleY(0.5);
          background: #86a8b7;
        }

        50% {
          transform: scaleY(1.08);
          background: #ecefca;
        }
      }
    </style>
  </head>
  <body>
    <div id="initial-loader">
      <div class="loader" aria-hidden="true">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
